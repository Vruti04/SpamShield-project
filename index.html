<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Shield | Premium Email Detector</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <header class="header animate-in">
            <div class="logo">
                <span class="icon">📧</span>
                <h1>SpamShield</h1>
            </div>
            <p class="subtitle">AI-powered email classification with precision.</p>
        </header>

        <section class="card animate-in">
            <div class="input-group">
                <label for="email-text">Paste your email content below</label>
                <textarea id="email-text" placeholder="Start typing or paste here... e.g., 'Congratulations! You've won a free gift card...'" spellcheck="false"></textarea>
            </div>

            <div class="actions">
                <button id="detect-btn" class="btn btn-primary">
                    <span class="btn-text">Analyze Content</span>
                    <div class="loader"></div>
                </button>
                <button id="clear-btn" class="btn btn-secondary">Clear</button>
            </div>
        </section>

        <section id="result-section" class="result-card hidden animate-in">
            <div class="result-header">
                <div id="status-icon" class="status-icon"></div>
                <div class="status-text">
                    <h2 id="status-title">Detection Result</h2>
                    <p id="status-desc">Classification details</p>
                </div>
            </div>
            <div class="confidence-meter">
                <div class="meter-label">
                    <span>Confidence Score</span>
                    <span id="confidence-val">0%</span>
                </div>
                <div class="meter-bar">
                    <div id="meter-fill" class="meter-fill"></div>
                </div>
            </div>
        </section>

        <footer class="footer animate-in">
            <p>&copy; 2026 SpamShield AI. All rights reserved.</p>
        </footer>
    </main>

    <script src="script.js"></script>
</body>
</html>
